name: Executable Specs CI

on:
  push:
    paths:
      - 'executable_specs/**'
      - 'SPEC-*.md'
      - 'SPEC-REGISTRY.md'
      - 'README.md'
      - '.github/workflows/spec-ci.yml'
  pull_request:
    paths:
      - 'executable_specs/**'
      - 'SPEC-*.md'
      - 'SPEC-REGISTRY.md'
      - 'README.md'
      - '.github/workflows/spec-ci.yml'

permissions:
  contents: read

jobs:
  spec-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spec: [spec003, spec004, spec005, spec006, spec009]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[test]"
        working-directory: executable_specs/${{ matrix.spec }}
      - name: Run tests
        run: python -m pytest -v
        working-directory: executable_specs/${{ matrix.spec }}
